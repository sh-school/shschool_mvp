version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       shschool_db
      POSTGRES_USER:     shschool_user
      POSTGRES_PASSWORD: shschool_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shschool_user -d shschool_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST:     db
      DB_NAME:     shschool_db
      DB_USER:     shschool_user
      DB_PASSWORD: shschool_pass
      DEBUG:       "True"
      SECRET_KEY:  "docker-dev-secret-key-shschool-2025-change-in-prod"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
