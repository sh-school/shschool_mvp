name: CI — جودة الكود + الاختبارات

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "claude/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════
  #  1. جودة الكود — ruff (يستبدل flake8 + black + isort)
  # ══════════════════════════════════════════════════════
  lint:
    name: Ruff — جودة الكود
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: تثبيت ruff
        run: pip install ruff==0.4.4

      - name: فحص الكود
        run: ruff check . --output-format=github

      - name: فحص التنسيق
        run: ruff format --check .

  # ══════════════════════════════════════════════════════
  #  2. فحص أمني — bandit (SAST)
  # ══════════════════════════════════════════════════════
  security:
    name: Bandit — فحص أمني
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: تثبيت bandit
        run: pip install bandit[toml]==1.7.8

      - name: فحص الثغرات الأمنية
        run: |
          bandit -r . \
            -x .venv,migrations,tests,manage.py \
            --severity-level high \
            --confidence-level high
        # يفشل فقط على High severity + High confidence

      - name: تقرير bandit كامل (للمراجعة)
        if: always()
        run: |
          bandit -r . \
            -x .venv,migrations,tests,manage.py \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true

      - name: رفع تقرير Bandit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ══════════════════════════════════════════════════════
  #  3. الاختبارات + Coverage Gate ≥80%
  # ══════════════════════════════════════════════════════
  test:
    name: pytest — اختبارات + تغطية ≥80%
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: shschool.settings.testing
      SECRET_KEY: ci-testing-only-not-for-production-use-a1b2c3d4e5f6
      FERNET_KEY: dGVzdC1mZXJuZXQta2V5LTMyLWJ5dGVzLWZvcmNpLS0=
      EXCEL_PROTECTION_PASSWORD: ci-testing-only

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: تثبيت مكتبات النظام (Cairo + WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libffi-dev \
            shared-mime-info \
            pkg-config

      - name: تثبيت المتطلبات
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov pytest-asyncio factory-boy \
            pytest-xdist==3.8.0 pytest-testmon==2.2.0

      - name: استعادة testmon cache
        uses: actions/cache@v4
        with:
          path: .testmondata
          key: testmon-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            testmon-${{ github.ref }}-
            testmon-refs/heads/main-
            testmon-refs/heads/develop-

      - name: تطبيق Migrations
        run: python manage.py migrate --noinput

      - name: التحقق من عدم وجود migrations غير مطبّقة
        run: python manage.py makemigrations --check --noinput

      - name: فحص إعدادات Django
        run: python manage.py check --fail-level WARNING

      - name: "★ الاختبارات (parallel + incremental) — target < 3 min"
        # pytest-xdist (-n auto): يستخدم كل الـ CPU cores
        # pytest-testmon (--testmon): يشغّل فقط الاختبارات المتأثرة بالتغييرات
        # --cov-fail-under=0: يعطّل الـ gate في الـ fast CI (fail-under مفعّل في nightly.yml على full suite)
        # التغطية الكاملة + fail-under=85 محفوظة في nightly.yml (safety net)
        run: |
          pytest tests/ -n auto --testmon \
            --junit-xml=test-results.xml \
            --cov-fail-under=0 \
            --tb=short

      - name: رفع نتائج الاختبارات
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
            htmlcov/

      - name: ملخص Coverage في GitHub Summary
        if: always()
        run: |
          echo "## نتائج التغطية" >> $GITHUB_STEP_SUMMARY
          echo "| المقياس | القيمة |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import xml.etree.ElementTree as ET, sys
          try:
              tree = ET.parse('coverage.xml')
              root = tree.getroot()
              rate = float(root.attrib.get('line-rate', 0)) * 100
              status = 'ناجح' if rate >= 80 else 'فاشل'
              print(f'| التغطية | {rate:.1f}% |')
              print(f'| الحالة | {status} |')
          except Exception as e:
              print('| التغطية | غير متاح |')
          " >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════
  #  4. فحص الأنواع — mypy (تحذير فقط)
  # ══════════════════════════════════════════════════════
  typecheck:
    name: mypy — فحص الأنواع (strict)
    runs-on: ubuntu-latest
    continue-on-error: true  # Phase 1: warn-only (849 legacy type errors)
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: تثبيت مكتبات النظام (Cairo)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libcairo2-dev pkg-config

      - name: تثبيت mypy + stubs + deps
        run: |
          pip install mypy==1.10.0 django-stubs==5.0.2 \
            djangorestframework-stubs==3.15.0
          pip install -r requirements.txt

      - name: فحص الأنواع (Phase 1 — warn-only)
        env:
          DJANGO_SETTINGS_MODULE: shschool.settings.testing
          SECRET_KEY: ci-testing-only-not-for-production-use-a1b2c3d4e5f6
          FERNET_KEY: dGVzdC1mZXJuZXQta2V5LTMyLWJ5dGVzLWZvcmNpLS0=
          EXCEL_PROTECTION_PASSWORD: ci-testing-only
        run: |
          mypy core/ shschool/ \
            --ignore-missing-imports \
            --exclude "migrations|\.venv|manage\.py|conftest" \
            --no-error-summary 2>&1 | head -50 || true
          echo "::warning::mypy type checking completed (warn-only — Phase 1)"

  # ══════════════════════════════════════════════════════
  #  5. فحص ثغرات المكتبات — pip-audit (blocking)
  # ══════════════════════════════════════════════════════
  dep-audit:
    name: pip-audit — ثغرات المكتبات
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: تثبيت مكتبات النظام (Cairo)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libcairo2-dev pkg-config

      - name: تثبيت pip-audit
        run: pip install pip-audit==2.7.3

      - name: فحص الثغرات (يفشل عند وجود CVEs)
        # ✅ v5.4: بدون --dry-run — يفشل CI فعلياً عند وجود ثغرات معروفة
        run: pip-audit -r requirements.txt --desc --progress-spinner off

  # ══════════════════════════════════════════════════════
  #  ملخص نهائي — يظهر في كل PR
  # ══════════════════════════════════════════════════════
  summary:
    name: ملخص CI
    runs-on: ubuntu-latest
    needs: [lint, security, test, dep-audit]
    if: always()
    steps:
      - name: نتيجة CI
        run: |
          echo "## نتيجة CI" >> $GITHUB_STEP_SUMMARY
          echo "| Job | النتيجة |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff — جودة الكود | ${{ needs.lint.result == 'success' && 'ناجح' || 'فاشل' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit — أمان | ${{ needs.security.result == 'success' && 'ناجح' || 'فاشل' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pytest + Coverage | ${{ needs.test.result == 'success' && 'ناجح' || 'فاشل' }} |" >> $GITHUB_STEP_SUMMARY
