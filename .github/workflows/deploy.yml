name: CD — نشر تلقائي للإنتاج (LEGACY — disabled, use deploy-railway.yml)

# ⚠️ DISABLED: This workflow was for SSH + Docker deployment.
# Railway deployment is now handled by deploy-railway.yml
on:
  workflow_dispatch:  # Manual trigger only — no longer auto-runs

# منع تشغيل نشرين في نفس الوقت
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: نشر على الخادم
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      # ── انتظار نجاح CI أولاً ──────────────────────────────────
      - name: انتظار نجاح اختبارات CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref:              ${{ github.sha }}
          # ✅ v5.4: يتطابق مع اسم job "summary" في ci.yml (ملخص CI)
          check-name:       "ملخص CI"
          repo-token:       ${{ secrets.GITHUB_TOKEN }}
          wait-interval:    10
          allowed-conclusions: success

      # ── النشر عبر SSH مع Rollback تلقائي ─────────────────────
      - name: نشر على الخادم (مع rollback عند الفشل)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /opt/schoolos

            # ── حفظ الحالة الحالية للـ rollback ──
            PREV_IMAGE=$(docker compose -f docker-compose.prod.yml images web -q 2>/dev/null || echo "")
            echo "▶ الـ Image الحالي: $PREV_IMAGE"

            # ── نسخة احتياطية سريعة قبل النشر ──
            echo "▶ نسخة احتياطية قبل النشر..."
            docker compose -f docker-compose.prod.yml exec -T backup sh /backup.sh || true

            echo "▶ سحب آخر تحديث..."
            git pull origin main

            echo "▶ بناء الـ Image الجديد (tagged by commit SHA)..."
            docker compose -f docker-compose.prod.yml build web
            docker tag schoolos-web:latest schoolos-web:${{ github.sha }}

            echo "▶ تطبيق Migrations..."
            docker compose -f docker-compose.prod.yml run --rm web \
              python manage.py migrate --noinput

            echo "▶ جمع الملفات الثابتة..."
            docker compose -f docker-compose.prod.yml run --rm web \
              python manage.py collectstatic --noinput

            echo "▶ إعادة تشغيل Web بدون توقف (Graceful)..."
            docker compose -f docker-compose.prod.yml up -d --no-deps web

            echo "▶ الانتظار حتى يعمل الـ container..."
            sleep 20

            echo "▶ فحص الجاهزية (readiness — DB فقط)..."
            # ✅ v5.4: /ready/ أسرع وأخف — يختبر DB فقط خلال النشر
            if ! curl -sf http://localhost/ready/ > /dev/null 2>&1; then
              echo "❌ فشل /ready/ — تنفيذ Rollback..."
              if [ -n "$PREV_IMAGE" ]; then
                docker tag "$PREV_IMAGE" schoolos-web:latest 2>/dev/null || true
                docker compose -f docker-compose.prod.yml up -d --no-deps web
                echo "🔄 Rollback تم — الخدمة أُعيدت للحالة السابقة"
              fi
              exit 1
            fi

            echo "▶ فحص صحة كامل (liveness — DB + Redis)..."
            if curl -sf http://localhost/health/ | python3 -m json.tool; then
              echo "✅ النشر تم بنجاح! (${{ github.sha }})"
            else
              echo "⚠️ /health/ أبطأ — قد يكون Redis يُهيَّأ. النشر تم لكن راجع Redis."
            fi

      # ── إشعارات ────────────────────────────────
      - name: إشعار النجاح
        if: success()
        run: echo "✅ تم نشر الإصدار ${{ github.sha }} بنجاح"

      - name: إشعار الفشل
        if: failure()
        run: echo "❌ فشل نشر الإصدار ${{ github.sha }} — راجع السجلات (rollback تم تلقائياً)"
