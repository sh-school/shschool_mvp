version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build: .
    restart: always
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: shschool.settings.production
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn shschool.wsgi:application
          --bind 0.0.0.0:8000
          --workers 3
          --timeout 120
          --access-logfile /app/logs/access.log
          --error-logfile  /app/logs/error.log
      "
    networks:
      - internal
      - external

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
