version: "3.9"

# ══════════════════════════════════════════════════════════════
# SchoolOS v5.2 — Compose الإنتاج
# - WAL archiving for PITR
# - Pinned image tags
# - Non-root containers
# ══════════════════════════════════════════════════════════════

services:

  # ── قاعدة البيانات (WAL archiving enabled) ────────────────
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # ✅ v5.2: WAL archiving for point-in-time recovery
    command: >
      postgres
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='test ! -f /backups/wal/%f && cp %p /backups/wal/%f || true'
        -c max_wal_senders=3
        -c log_statement=ddl
        -c log_connections=on
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis (Broker + Cache) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Django (Web) ─────────────────────────────────────────────
  web:
    build: .
    restart: always
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: shschool.settings.production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 shschool.asgi:application
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - external

  # ── Celery Worker — معالجة الإشعارات غير المتزامنة ──────────
  celery_worker:
    build: .
    restart: always
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: shschool.settings.production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A shschool worker
        --loglevel=info
        --concurrency=2
        --logfile=/app/logs/celery_worker.log
    networks:
      - internal

  # ── Celery Beat — المهام المُجدوَلة (تنبيهات الغياب اليومية) ─
  celery_beat:
    build: .
    restart: always
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: shschool.settings.production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A shschool beat
        --loglevel=info
        --logfile=/app/logs/celery_beat.log
    networks:
      - internal

  # ── Backup — نسخ احتياطي يومي 2:00 ص ───────────────────────
  backup:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        mkdir -p /backups/wal &&
        echo '0 2 * * * sh /backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 8
      "
    networks:
      - internal

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - external
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
