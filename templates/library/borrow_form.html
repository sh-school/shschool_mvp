{% extends "base/base.html" %}
{% block title %}إعارة كتاب{% endblock %}
{% block content %}
<div dir="rtl" class="max-w-xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="page-title">{% include "components/icon.html" with name="book-open" %} تسجيل إعارة جديدة</h1>
    <a href="{% url 'library:dashboard' %}" class="text-sm border px-4 py-2 rounded-lg hover:bg-gray-50">← رجوع</a>
  </div>
  <div class="card-qatar">
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-1">الكتاب <span class="text-red-500">*</span></label>
          <select name="book_id" required
                  class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-300">
            <option value="">— اختر الكتاب —</option>
            {% for book in books %}
            {% if book.available_qty > 0 %}
            <option value="{{ book.id }}">{{ book.title }} — {{ book.author }} ({{ book.available_qty }} متوفر)</option>
            {% endif %}
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-1">المستعير <span class="text-red-500">*</span></label>
          <select name="user_id" required
                  class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-300">
            <option value="">— اختر الطالب أو الموظف —</option>
            {% for u in borrowers %}
            <option value="{{ u.id }}">{{ u.full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-1">تاريخ الإرجاع المتوقع <span class="text-red-500">*</span></label>
          <input type="date" name="due_date" required
                 class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-300">
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-danger flex-1 text-white py-2.5 rounded-lg text-sm font-medium">
          {% include "components/icon.html" with name="book-open" %} تسجيل الإعارة
        </button>
        <a href="{% url 'library:dashboard' %}" class="px-6 py-2.5 border rounded-lg text-sm text-gray-600 hover:bg-gray-50">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
