{% extends "base/base.html" %}
{% block title %}إضافة حصة للجدول{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="bg-[#0F2347] px-6 py-4">
      <h1 class="text-xl font-bold text-white">إضافة حصة للجدول الأسبوعي</h1>
    </div>
    <form method="post" action="{% url 'slot_create' %}" class="p-6 space-y-4">
      {% csrf_token %}
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">المعلم *</label>
          <select name="teacher" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400">
            <option value="">اختر المعلم</option>
            {% for t in teachers %}
            <option value="{{ t.id }}">{{ t.full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">الفصل *</label>
          <select name="class_group" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400">
            <option value="">اختر الفصل</option>
            {% for c in classes %}
            <option value="{{ c.id }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">المادة</label>
          <select name="subject" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400">
            <option value="">— اختياري —</option>
            {% for s in subjects %}
            <option value="{{ s.id }}">{{ s.name_ar }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">اليوم *</label>
          <select name="day_of_week" required class="w-full border rounded-lg px-3 py-2 text-sm">
            {% for val, label in days %}
            <option value="{{ val }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">رقم الحصة *</label>
          <select name="period_number" required class="w-full border rounded-lg px-3 py-2 text-sm">
            {% for p in "12345678" %}
            <option value="{{ p }}">الحصة {{ p }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">وقت البدء *</label>
          <input type="time" name="start_time" required class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">وقت النهاية *</label>
          <input type="time" name="end_time" required class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="px-6 py-2 bg-[#1A4F8A] text-white rounded-lg text-sm hover:bg-[#0F2347] transition">
          حفظ الحصة
        </button>
        <a href="{% url 'weekly_schedule' %}" class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition">
          إلغاء
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
