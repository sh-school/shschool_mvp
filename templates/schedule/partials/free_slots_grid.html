<div class="free-slots-card">
  <h3 class="free-slots-title">الحصص الحرة — {{ teacher.full_name }}</h3>
  <table style="width:100%;border-collapse:collapse;font-size:.78rem">
    <thead>
      <tr>
        {% for d_num, d_name in days %}
        <th class="free-slots-th">{{ d_name }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      <tr>
        {% for d_num, d_name in days %}
        <td class="free-slots-td">
          {% for p in grid|dictkey:d_num %}
            <span class="free-slot-badge">ح{{ p }}</span>
          {% empty %}
            <span class="free-slot-none">—</span>
          {% endfor %}
        </td>
        {% endfor %}
      </tr>
    </tbody>
  </table>
</div>
