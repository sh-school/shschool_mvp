<div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
  <div class="text-2xl font-bold text-green-700">{{ summary.present|default:0 }}</div>
  <div class="text-xs text-green-600 mt-0.5">حاضر</div>
</div>
<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
  <div class="text-2xl font-bold text-red-700">{{ summary.absent|default:0 }}</div>
  <div class="text-xs text-red-600 mt-0.5">غائب</div>
</div>
<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center">
  <div class="text-2xl font-bold text-yellow-700">{{ summary.late|default:0 }}</div>
  <div class="text-xs text-yellow-600 mt-0.5">متأخر</div>
</div>
<div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
  <div class="text-2xl font-bold text-blue-700">{{ summary.percentage|default:0 }}%</div>
  <div class="text-xs text-blue-600 mt-0.5">نسبة الحضور</div>
</div>
