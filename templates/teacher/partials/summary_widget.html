<div class="kpi-card">
  <div class="kpi-value text-status-success">{{ summary.present|default:0 }}</div>
  <div class="kpi-label">حاضر</div>
</div>
<div class="kpi-card">
  <div class="kpi-value text-status-danger">{{ summary.absent|default:0 }}</div>
  <div class="kpi-label">غائب</div>
</div>
<div class="kpi-card">
  <div class="kpi-value text-status-warning">{{ summary.late|default:0 }}</div>
  <div class="kpi-label">متأخر</div>
</div>
<div class="kpi-card">
  <div class="kpi-value text-skyline">{{ summary.percentage|default:0 }}%</div>
  <div class="kpi-label">نسبة الحضور</div>
</div>
