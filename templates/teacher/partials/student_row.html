<div id="student-{{ student.id }}"
     class="flex items-center px-4 py-3 hover:bg-gray-50 transition status-{{ status }}">

  <!-- Student info -->
  <div class="flex-1 min-w-0">
    <div class="font-medium text-gray-900 text-sm truncate">{{ student.full_name }}</div>
    <div class="text-xs text-gray-400 font-mono">{{ student.national_id }}</div>
  </div>

  <!-- Status Badge -->
  <div class="mx-3">
    <span id="badge-{{ student.id }}" class="inline-block px-2.5 py-1 rounded-full text-xs font-semibold
      {% if status == 'present' %}bg-green-100 text-green-800
      {% elif status == 'absent' %}bg-red-100 text-red-800
      {% elif status == 'late' %}bg-yellow-100 text-yellow-800
      {% elif status == 'excused' %}bg-purple-100 text-purple-800
      {% else %}bg-gray-100 text-gray-600{% endif %}">
      {% if status == 'present' %}حاضر
      {% elif status == 'absent' %}غائب
      {% elif status == 'late' %}متأخر
      {% elif status == 'excused' %}معذور
      {% else %}—{% endif %}
    </span>
  </div>

  <!-- Action Buttons -->
  <div class="flex items-center gap-1">
    {% for st, label, color in action_buttons %}
    {% endfor %}

    <button
      hx-post="/teacher/attendance/{{ session.id }}/mark-single/"
      hx-vals='{"student_id": "{{ student.id }}", "status": "present"}'
      hx-target="#student-{{ student.id }}"
      hx-swap="outerHTML"
      hx-include="[name=csrfmiddlewaretoken]"
      class="px-2.5 py-1.5 rounded-lg text-xs font-medium transition
        {% if status == 'present' %}bg-green-600 text-white{% else %}bg-gray-100 text-gray-600 hover:bg-green-100 hover:text-green-700{% endif %}">
      حاضر
    </button>

    <button
      hx-post="/teacher/attendance/{{ session.id }}/mark-single/"
      hx-vals='{"student_id": "{{ student.id }}", "status": "absent"}'
      hx-target="#student-{{ student.id }}"
      hx-swap="outerHTML"
      hx-include="[name=csrfmiddlewaretoken]"
      class="px-2.5 py-1.5 rounded-lg text-xs font-medium transition
        {% if status == 'absent' %}bg-red-600 text-white{% else %}bg-gray-100 text-gray-600 hover:bg-red-100 hover:text-red-700{% endif %}">
      غائب
    </button>

    <button
      hx-post="/teacher/attendance/{{ session.id }}/mark-single/"
      hx-vals='{"student_id": "{{ student.id }}", "status": "late"}'
      hx-target="#student-{{ student.id }}"
      hx-swap="outerHTML"
      hx-include="[name=csrfmiddlewaretoken]"
      class="px-2.5 py-1.5 rounded-lg text-xs font-medium transition
        {% if status == 'late' %}bg-yellow-600 text-white{% else %}bg-gray-100 text-gray-600 hover:bg-yellow-100 hover:text-yellow-700{% endif %}">
      متأخر
    </button>

    <button
      hx-post="/teacher/attendance/{{ session.id }}/mark-single/"
      hx-vals='{"student_id": "{{ student.id }}", "status": "excused"}'
      hx-target="#student-{{ student.id }}"
      hx-swap="outerHTML"
      hx-include="[name=csrfmiddlewaretoken]"
      class="px-2.5 py-1.5 rounded-lg text-xs font-medium transition
        {% if status == 'excused' %}bg-purple-600 text-white{% else %}bg-gray-100 text-gray-600 hover:bg-purple-100 hover:text-purple-700{% endif %}">
      معذور
    </button>
  </div>
</div>
{% if summary %}<script nonce="{{ request.csp_nonce }}">document.getElementById('summary-widget')?.dispatchEvent(new Event('refresh'));</script>{% endif %}
