<div class="bg-green-50 border border-green-200 rounded-lg p-4 mt-4">
  <p class="font-bold text-green-800">{% include "components/icon.html" with name="check-circle" %} تم تسجيل الزيارة بنجاح</p>
  <p class="text-sm text-green-600 mt-1">
    {{ visit.student.full_name }} — {{ visit.visit_date|date:"d/m/Y H:i" }}
    {% if visit.is_sent_home %} | <strong>أُرسل للمنزل</strong>{% endif %}
  </p>
  <a href="{% url 'clinic:health_record' visit.student.id %}" class="text-sm text-green-700 underline mt-2 inline-block">
    عرض السجل الصحي الكامل →
  </a>
</div>
