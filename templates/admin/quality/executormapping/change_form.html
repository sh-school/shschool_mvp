{% extends "admin/change_form.html" %}

{% block after_related_objects %}
{{ block.super }}
<style>
/* إصلاح Select2 في الوضع الليلي — إجبار الألوان الفاتحة */
.select2-container--default .select2-selection--single,
.select2-container--default .select2-dropdown,
.select2-container--default .select2-results__option {
  background-color: #ffffff !important;
  color: #111827 !important;
  color-scheme: light;
}
.select2-container--default .select2-selection--single .select2-selection__rendered {
  color: #111827 !important;
}
.select2-container--default .select2-selection--single .select2-selection__placeholder {
  color: #6b7280 !important;
}
.select2-container--default .select2-results__option--highlighted {
  background-color: #2563eb !important;
  color: #ffffff !important;
}
.select2-container--default .select2-search__field {
  background: #f9fafb !important;
  color: #111827 !important;
  border-color: #d1d5db !important;
}
.select2-container--default .select2-selection--single {
  border-color: #d1d5db !important;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof django !== 'undefined' && django.jQuery) {
    var $ = django.jQuery;
    $('#id_executor_norm').select2({
      language: 'ar',
      placeholder: '— ابحث عن المسمى الوظيفي —',
      allowClear: true,
      width: '100%',
      dir: 'rtl',
    });
    function reloadNorms() {
      var school = $('#id_school').val();
      var year   = $('#id_academic_year').val() || '2025-2026';
      if (!school) return;
      $.getJSON('/admin/quality/executormapping/norms/', { school: school, year: year }, function(data) {
        var $sel = $('#id_executor_norm');
        var current = $sel.val();
        $sel.empty().append('<option value="">— اختر المسمى الوظيفي —</option>');
        $.each(data.norms, function(_, n) {
          $sel.append('<option value="' + n + '"' + (n === current ? ' selected' : '') + '>' + n + '</option>');
        });
        $sel.trigger('change');
      });
    }
    $('#id_school, #id_academic_year').on('change', reloadNorms);
  }
});
</script>
{% endblock %}
