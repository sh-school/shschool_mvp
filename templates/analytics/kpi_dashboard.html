{% extends "base.html" %}
{% block title %}لوحة KPIs{% endblock %}
{% block content %}
<div class="container-fluid mt-3" dir="rtl">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold" style="color:#8A1538">📊 مؤشرات الأداء الرئيسية — {{ year }}</h4>
    <select id="yearSelect" class="form-select form-select-sm" style="width:160px">
      <option value="2025-2026" {% if year == "2025-2026" %}selected{% endif %}>2025-2026</option>
      <option value="2024-2025" {% if year == "2024-2025" %}selected{% endif %}>2024-2025</option>
    </select>
  </div>

  <div id="kpiGrid" class="row g-3">
    <div class="col-12 text-center text-muted py-5">
      <div class="spinner-border" style="color:#8A1538"></div>
      <p class="mt-2">جاري تحميل المؤشرات...</p>
    </div>
  </div>
</div>

<style>
.kpi-card { border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.08); background:#fff; }
.kpi-val  { font-size:2.2rem; font-weight:700; line-height:1; }
.kpi-lbl  { font-size:.85rem; color:#555; margin-top:4px; }
.kpi-meta { font-size:.75rem; color:#888; margin-top:6px; }
.kpi-bar  { height:6px; border-radius:3px; margin-top:10px; background:#e5e7eb; }
.kpi-bar-fill { height:100%; border-radius:3px; transition:width .6s; }
.dot-green  { background:#16a34a; }
.dot-yellow { background:#d97706; }
.dot-red    { background:#dc2626; }
.dot-grey   { background:#9ca3af; }
.traffic-dot { width:12px; height:12px; border-radius:50%; display:inline-block; }
</style>

<script>
const COLOR = { green:'#16a34a', yellow:'#d97706', red:'#dc2626', grey:'#9ca3af' };

function renderKPI(key, d) {
  const val    = d.value !== null ? d.value : '—';
  const unit   = d.unit || '';
  const color  = COLOR[d.traffic] || COLOR.grey;
  const higher = d.direction !== 'lower_better';
  const pct    = d.value !== null
    ? Math.min(100, (higher ? d.value/d.target : (d.target ? (1-(d.value/d.target))*100+50 : 50)))
    : 0;

  return `
  <div class="col-12 col-sm-6 col-xl-4">
    <div class="kpi-card">
      <div class="d-flex justify-content-between align-items-start">
        <div class="kpi-lbl fw-semibold">${d.label}</div>
        <span class="traffic-dot dot-${d.traffic}" title="${d.traffic}"></span>
      </div>
      <div class="kpi-val mt-2" style="color:${color}">
        ${val !== null && val !== undefined ? val : '—'}<span style="font-size:1rem;font-weight:400"> ${unit}</span>
      </div>
      <div class="kpi-bar">
        <div class="kpi-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="kpi-meta">
        🎯 الهدف: <b>${d.target}${unit}</b> &nbsp;|&nbsp;
        ⚠️ التحذير: <b>${d.warning}${unit}</b> &nbsp;|&nbsp;
        🔄 ${d.frequency}
        ${d.note ? `<br><span style="color:#6b7280">📝 ${d.note}</span>` : ''}
      </div>
    </div>
  </div>`;
}

async function loadKPIs(year) {
  document.getElementById('kpiGrid').innerHTML =
    '<div class="col-12 text-center py-5"><div class="spinner-border" style="color:#8A1538"></div></div>';
  try {
    const r = await fetch(`/analytics/api/kpis/?year=${year}`);
    const data = await r.json();
    const kpis = data.kpis;
    let html = '';
    for (const [k, v] of Object.entries(kpis)) html += renderKPI(k, v);
    document.getElementById('kpiGrid').innerHTML = html;
  } catch(e) {
    document.getElementById('kpiGrid').innerHTML =
      '<div class="col-12"><div class="alert alert-danger">خطأ في تحميل البيانات</div></div>';
  }
}

document.getElementById('yearSelect').addEventListener('change', e => loadKPIs(e.target.value));
loadKPIs('{{ year }}');
</script>
{% endblock %}
