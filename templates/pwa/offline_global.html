<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8A1538">
  <title>غير متصل — مدرسة الشحانية</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', 'Segoe UI', Arial, sans-serif;
      background: #8A1538;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
    }
    .offline-icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 14px; opacity: 0.85; line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #fff;
      color: #8A1538;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .logo {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 13px;
      opacity: .6;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="logo"><svg style="width:16px;height:16px;display:inline-block;vertical-align:-2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg> مدرسة الشحانية</div>
  <div class="card">
    <div class="offline-icon"><svg style="width:4rem;height:4rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5 12.859a10 10 0 0 1 5.17-2.69"/><path d="M19 12.859a10 10 0 0 0-2.007-1.523"/><path d="M2 8.82a15 15 0 0 1 4.177-2.643"/><path d="M22 8.82a15 15 0 0 0-11.288-3.764"/><path d="m2 2 20 20"/></svg></div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>يبدو أن الاتصال بالشبكة انقطع.<br>تحقق من الاتصال ثم أعد المحاولة.</p>
    <button class="btn" onclick="window.location.reload()"><svg style="width:16px;height:16px;display:inline-block;vertical-align:-2px" viewBox="0 0 24 24" fill="none" stroke="#8A1538" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg> إعادة المحاولة</button>
  </div>
  <script>
    /* إعادة التحميل تلقائياً عند استعادة الاتصال */
    window.addEventListener('online', function () {
      window.location.reload();
    });
  </script>
</body>
</html>
