{% extends "base.html" %}
{% block title %}تسجيل مخالفة سلوكية{% endblock %}
{% block content %}
<div dir="rtl" class="max-w-2xl mx-auto">
 <div class="flex justify-between items-center mb-6">
 <h1 class="text-2xl font-bold text-gray-800">⚖️ تسجيل مخالفة سلوكية</h1>
 <a href="{% url 'behavior:dashboard' %}" class="text-sm border border-gray-300 px-4 py-2 rounded-lg hover:bg-gray-50 text-gray-700">← رجوع</a>
 </div>
 <div class="bg-white rounded-xl shadow-sm p-6">
 <form method="post" data-validate>
 {% csrf_token %}
 <div class="space-y-4">
 <div>
 <label class="text-sm font-medium text-gray-700 block mb-1">الطالب <span class="text-red-500">*</span></label>
 <select name="student_id" required id="studentSelect"
 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-300 bg-white text-gray-900">
 <option value="">— اختر الطالب —</option>
 {% for s in students %}
 <option value="{{ s.id }}">{{ s.full_name }}</option>
 {% endfor %}
 </select>
 </div>
 <div>
 <label class="text-sm font-medium text-gray-700 block mb-1">درجة المخالفة <span class="text-red-500">*</span></label>
 <div class="grid grid-cols-2 gap-2" id="levelOptions">
 {% for val, label in levels %}
 <label class="flex items-center gap-2 border border-gray-300 rounded-lg p-3 cursor-pointer hover:bg-gray-50 has-[:checked]:border-red-500 has-[:checked]:bg-red-50">
 <input type="radio" name="level" value="{{ val }}" class="accent-red-600"
 onchange="updatePoints({{ POINTS_BY_LEVEL|default:'{}' }}, {{ val }})"
 {% if val == 1 %}checked{% endif %}>
 <div>
 <p class="text-sm font-medium text-gray-800">الدرجة {{ val }}</p>
 <p class="text-xs text-gray-500">{{ label }}</p>
 </div>
 </label>
 {% endfor %}
 </div>
 </div>
 <div>
 <label class="text-sm font-medium text-gray-700 block mb-1">وصف المخالفة <span class="text-red-500">*</span></label>
 <textarea name="description" rows="3" required
 placeholder="اكتب وصفاً تفصيلياً للمخالفة..."
 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none focus:ring-2 focus:ring-red-300 bg-white text-gray-900 placeholder:text-gray-400"></textarea>
 </div>
 <div class="grid grid-cols-2 gap-4">
 <div>
 <label class="text-sm font-medium text-gray-700 block mb-1">النقاط المخصومة</label>
 <input type="number" name="points_deducted" id="pointsInput" value="5" min="0" max="100"
 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-300 bg-white text-gray-900">
 </div>
 <div>
 <label class="text-sm font-medium text-gray-700 block mb-1">الإجراء الأولي</label>
 <input type="text" name="action_taken" placeholder="مثال: تحذير شفوي..."
 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-300 bg-white text-gray-900 placeholder:text-gray-400">
 </div>
 </div>
 <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 text-sm text-orange-700">
 ⚠️ المخالفات من الدرجة 3 و4 ستُحال تلقائياً للجنة الضبط السلوكي
 </div>
 </div>
 <div class="flex gap-3 mt-6">
 <button type="submit" class="btn-danger flex-1 text-white py-2.5 rounded-lg text-sm font-medium transition">
 تسجيل المخالفة
 </button>
 <a href="{% url 'behavior:dashboard' %}" class="px-6 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">إلغاء</a>
 </div>
 </form>
 </div>
</div>
<script nonce="{{ request.csp_nonce }}">
const points = {"1": 5, "2": 15, "3": 25, "4": 40};
document.querySelectorAll('input[name="level"]').forEach(r => {
 r.addEventListener('change', () => {
 document.getElementById('pointsInput').value = points[r.value] || 5;
 });
});
</script>
{% endblock %}
