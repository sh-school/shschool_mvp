<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 1.8cm 2cm 2cm 2cm; }
  * { box-sizing: border-box; }
  html { direction: rtl; }
  body {
    font-family: 'Tajawal', 'Amiri', Tahoma, Arial, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    direction: rtl;
    text-align: right;
    margin: 0;
    padding: 0;
    background: #fff;
  }
  /* ===== HEADER ===== */
  .doc-header {
    width: 100%;
    border-bottom: 3px solid #8A1538;
    padding-bottom: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .doc-header-logo-cell {
    float: right;
    width: 80px;
    text-align: center;
  }
  .doc-header-logo {
    width: 56px;
    height: 56px;
    object-fit: contain;
    border-radius: 50%;
    background: #8A1538;
    padding: 6px;
  }
  .doc-header-logo-placeholder {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #8A1538;
    display: inline-block;
    text-align: center;
    line-height: 56px;
    color: #fff;
    font-size: 22px;
    font-weight: 900;
  }
  .doc-header-text-cell {
    margin-right: 90px;
    margin-left: 90px;
    text-align: center;
    padding-top: 4px;
  }
  .doc-header-ministry {
    font-size: 11px;
    color: #666;
    margin-bottom: 3px;
  }
  .doc-header-school {
    font-size: 17px;
    font-weight: 900;
    color: #8A1538;
    line-height: 1.3;
  }
  .doc-header-seal-cell {
    float: left;
    width: 80px;
    text-align: center;
  }
  .doc-header-seal {
    width: 56px;
    height: 56px;
    border: 2px solid #8A1538;
    border-radius: 50%;
    color: #8A1538;
    font-size: 9px;
    font-weight: 700;
    text-align: center;
    line-height: 14px;
    padding-top: 12px;
    margin: auto;
  }
  /* Suppress duplicated names from child templates */
  .school-name { display: none !important; }
  .report-header { display: none !important; }
  .header h1 { display: none !important; }
  /* Keep form-title / date-line from child .header divs */
  .header .form-title { display: block !important; }
  .header .date-line  { display: block !important; }

  /* ===== SECTIONS ===== */
  .section { margin-bottom: 14px; page-break-inside: avoid; }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    background: #8A1538;
    padding: 5px 10px;
    border-radius: 3px;
    margin-bottom: 8px;
  }
  .report-title { font-size: 13px; font-weight: 700; color: #8A1538; margin-bottom: 6px; }
  .form-title { font-size: 15px; font-weight: 900; color: #8A1538; text-align: center; margin: 6px 0 2px 0; }
  .date-line { font-size: 11px; color: #555; text-align: center; margin-bottom: 8px; }

  /* ===== FIELDS ===== */
  .field-row {
    display: table;
    width: 100%;
    margin-bottom: 6px;
    border-bottom: 1px dotted #ddd;
    padding-bottom: 4px;
  }
  .field-label {
    display: table-cell;
    font-weight: 700;
    font-size: 12px;
    color: #444;
    width: 22%;
    white-space: nowrap;
  }
  .field-value {
    display: table-cell;
    font-size: 12px;
    color: #1a1a1a;
    padding-right: 10px;
  }
  .body-text { font-size: 12px; line-height: 1.7; color: #222; margin: 4px 0; }

  /* ===== CHECKBOXES ===== */
  .checkbox-row { display: flex; flex-wrap: wrap; gap: 10px 24px; margin: 6px 0; }
  .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .checkbox-box {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 1.5px solid #555;
    text-align: center;
    line-height: 12px;
    font-size: 11px;
    border-radius: 2px;
  }

  /* ===== BADGES ===== */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .badge-A { background: #fee2e2; color: #991b1b; }
  .badge-B { background: #fef9c3; color: #854d0e; }
  .badge-C { background: #f0fdf4; color: #166534; }

  /* ===== SIGNATURES ===== */
  .sig-section { margin-top: 28px; page-break-inside: avoid; }
  .sig-grid { display: table; width: 100%; }
  .sig-box { display: table-cell; width: 33.33%; text-align: center; padding: 0 8px; vertical-align: bottom; }
  .sig-line { border-top: 1.5px solid #333; padding-top: 6px; font-size: 11px; color: #333; margin-top: 40px; }

  /* ===== FOOTER ===== */
  .doc-footer {
    position: fixed;
    bottom: 0.6cm;
    left: 2cm;
    right: 2cm;
    border-top: 1.5px solid #8A1538;
    padding-top: 4px;
    display: table;
    width: 100%;
  }
  .doc-footer-right { display: table-cell; font-size: 9px; color: #888; text-align: right; }
  .doc-footer-left  { display: table-cell; font-size: 9px; color: #888; text-align: left; }
  .notice {
    margin-top: 18px;
    font-size: 10px;
    color: #888;
    text-align: center;
    border-top: 1px solid #eee;
    padding-top: 6px;
    page-break-inside: avoid;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .no-print { display: none; }
  }
</style>
</head>
<body>

<!-- ===== DOCUMENT HEADER ===== -->
<div class="doc-header">
  <div class="doc-header-logo-cell">
    <img src="static/brand/logowhite.png" class="doc-header-logo" alt="شعار المدرسة">
  </div>
  <div class="doc-header-seal-cell">
    <div class="doc-header-seal">الختم<br>الرسمي</div>
  </div>
  <div class="doc-header-text-cell">
    <div class="doc-header-ministry">وزارة التربية والتعليم والتعليم العالي — دولة قطر</div>
    <div class="doc-header-school">{{ school.name|default:"مدرسة الشحانية الإعدادية الثانوية للبنين" }}</div>
  </div>
</div>

<!-- ===== CHILD TEMPLATE CONTENT ===== -->
{% block content %}{% endblock %}

<!-- ===== DOCUMENT FOOTER ===== -->
<div class="doc-footer">
  <div class="doc-footer-right">{{ school.name|default:"مدرسة الشحانية الإعدادية الثانوية للبنين" }}</div>
  <div class="doc-footer-left">SchoolOS v6 | {{ generated_at|date:"Y/m/d H:i" }}</div>
</div>

</body>
</html>
