<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — غير مصرح</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #fdf2f5 0%, #f9fafb 50%, #f0f4ff 100%);
      color: #111827;
    }
    .error-card {
      text-align: center;
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
      border-top: 4px solid #d97706;
    }
    .error-code {
      font-size: 80px;
      font-weight: 800;
      color: #d97706;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .error-btn {
      display: inline-block;
      background: #8A1538;
      color: #fff;
      padding: 12px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: background 150ms ease, box-shadow 150ms ease;
    }
    .error-btn:hover {
      background: #6b0f2a;
      box-shadow: 0 4px 16px rgba(138,21,56,.25);
    }
    .error-footer {
      margin-top: 32px;
      font-size: 11px;
      color: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(145deg, #0f172a 0%, #1a0a12 50%, #0c1a35 100%); color: #f1f5f9; }
      .error-card { background: #1e293b; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
      .error-title { color: #f1f5f9; }
      .error-desc { color: #94a3b8; }
      .error-footer { color: #64748b; }
    }
  </style>
  <script>
    (function(){var t=localStorage.getItem('theme');
    if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches))
      document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    html.dark body { background: linear-gradient(145deg, #0f172a 0%, #1a0a12 50%, #0c1a35 100%); color: #f1f5f9; }
    html.dark .error-card { background: #1e293b; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    html.dark .error-title { color: #f1f5f9; }
    html.dark .error-desc { color: #94a3b8; }
    html.dark .error-footer { color: #64748b; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">403</div>
    <h1 class="error-title"><svg style="width:28px;height:28px;display:inline-block;vertical-align:-4px;margin-inline-end:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="16" r="1"/><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>غير مصرح بالوصول</h1>
    <p class="error-desc">ليس لديك صلاحية للوصول إلى هذه الصفحة.<br>تواصل مع مدير النظام إذا كنت تعتقد أن هذا خطأ.</p>
    <a href="/dashboard/" class="error-btn">العودة للرئيسية</a>
    <div class="error-footer">{{ current_school.name|default:"مدرسة الشحانية الإعدادية الثانوية للبنين" }} — وزارة التربية والتعليم والتعليم العالي</div>
  </div>
</body>
</html>
