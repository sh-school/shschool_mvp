<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — خطأ في الخادم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #fdf2f5 0%, #f9fafb 50%, #f0f4ff 100%);
      color: #111827;
    }
    .error-card {
      text-align: center;
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
      border-top: 4px solid #dc2626;
    }
    .error-code {
      font-size: 80px;
      font-weight: 800;
      color: #dc2626;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .error-btn {
      display: inline-block;
      background: #8A1538;
      color: #fff;
      padding: 12px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: background 150ms ease, box-shadow 150ms ease;
    }
    .error-btn:hover {
      background: #6b0f2a;
      box-shadow: 0 4px 16px rgba(138,21,56,.25);
    }
    .error-footer {
      margin-top: 32px;
      font-size: 11px;
      color: #9ca3af;
    }
    .error-icon-bg {
      width: 80px; height: 80px; margin: 0 auto 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(220,38,38,.1) 0%, rgba(138,21,56,.06) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .error-btn-outline {
      display: inline-block;
      background: transparent;
      color: #8A1538;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      border: 2px solid #8A1538;
      transition: background 150ms ease, color 150ms ease;
    }
    .error-btn-outline:hover { background: #8A1538; color: #fff; }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(145deg, #0f172a 0%, #1a0a12 50%, #0c1a35 100%); color: #f1f5f9; }
      .error-card { background: #1e293b; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
      .error-title { color: #f1f5f9; }
      .error-desc { color: #94a3b8; }
      .error-footer { color: #64748b; }
    }
  </style>
  <script>
    (function(){var t=localStorage.getItem('theme');
    if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches))
      document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    html.dark body { background: linear-gradient(145deg, #0f172a 0%, #1a0a12 50%, #0c1a35 100%); color: #f1f5f9; }
    html.dark .error-card { background: #1e293b; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    html.dark .error-title { color: #f1f5f9; }
    html.dark .error-desc { color: #94a3b8; }
    html.dark .error-footer { color: #64748b; }
    html.dark .error-icon-bg { background: linear-gradient(135deg, rgba(220,38,38,.2) 0%, rgba(138,21,56,.12) 100%); }
    html.dark .error-btn-outline { color: #fca5a5; border-color: #fca5a5; }
    html.dark .error-btn-outline:hover { background: #fca5a5; color: #1e293b; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon-bg">
      <svg style="width:40px;height:40px" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    </div>
    <div class="error-code">500</div>
    <h1 class="error-title">خطأ في الخادم</h1>
    <p class="error-desc">حدث خطأ غير متوقع في النظام.<br>تم إبلاغ الفريق التقني وسيتم إصلاح المشكلة قريباً.</p>
    <div class="error-actions">
      <a href="/dashboard/" class="error-btn">العودة للرئيسية</a>
      <a href="javascript:history.back()" class="error-btn-outline">الرجوع للخلف</a>
    </div>
    <div class="error-footer">{{ current_school.name|default:"مدرسة الشحانية الإعدادية الثانوية للبنين" }} — وزارة التربية والتعليم والتعليم العالي</div>
  </div>
</body>
</html>
