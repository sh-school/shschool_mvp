<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — SchoolOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8">

      <div class="text-center mb-8">
        <div style="width:64px;height:64px;border-radius:50%;background:#8A1538;color:white;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">S</div>
        <h1 class="text-2xl font-bold text-gray-900">SchoolOS</h1>
        <p class="text-gray-500 text-sm mt-1">مدرسة الشحانية الإعدادية الثانوية للبنين</p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <div class="bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 text-sm mb-4">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="post" action="/auth/login/" class="space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">الرقم الوطني</label>
          <input
            type="text"
            name="national_id"
            required
            autofocus
            style="width:100%;padding:12px 16px;border:1px solid #d1d5db;border-radius:12px;font-size:14px;outline:none;text-align:right;"
            placeholder="أدخل رقمك الوطني"
            dir="ltr"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
          <input
            type="password"
            name="password"
            required
            style="width:100%;padding:12px 16px;border:1px solid #d1d5db;border-radius:12px;font-size:14px;outline:none;"
            placeholder="••••••••"
          >
        </div>

        <button
          type="submit"
          style="width:100%;background:#8A1538;color:white;font-weight:600;padding:12px 16px;border-radius:12px;border:none;cursor:pointer;font-size:14px;"
          onmouseover="this.style.background='#6d1030'"
          onmouseout="this.style.background='#8A1538'"
        >
          تسجيل الدخول
        </button>
      </form>

      <div class="mt-6 p-4 bg-gray-50 rounded-xl text-xs text-gray-500">
        <p class="font-semibold mb-1">للتجربة:</p>
        <p>مدير: <span class="font-mono">00000000001</span> / <span class="font-mono">admin123</span></p>
        <p>معلم: <span class="font-mono">00000000002</span> / <span class="font-mono">teacher123</span></p>
      </div>

    </div>
  </div>

</body>
</html>
