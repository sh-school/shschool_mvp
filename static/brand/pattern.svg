<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <rect width="80" height="80" fill="none"/>

    <!-- Andalusian Islamic Geometric Pattern (Gold) -->
    <g stroke="#D4AF37" stroke-width="1.5" fill="none">
        <!-- Outer Diamond -->
        <path d="M40 0 L80 40 L40 80 L0 40 Z" opacity="0.4"/>

        <!-- Main Interlacing Star (The Rub el Hizb structure) -->
        <!-- Square 1 -->
        <rect x="20" y="20" width="40" height="40"/>
        <!-- Square 2 (Rotated diamond) -->
        <path d="M40 11.72 L68.28 40 L40 68.28 L11.72 40 Z" />

        <!-- Inner Star -->
        <path d="M40 25 L55 40 L40 55 L25 40 Z" opacity="0.7"/>

        <!-- Connecting Lines for seamless tiling -->
        <path d="M40 0 L40 11.72" />
        <path d="M80 40 L68.28 40" />
        <path d="M40 80 L40 68.28" />
        <path d="M0 40 L11.72 40" />

        <!-- Diagonal Corner Connections -->
        <path d="M0 0 L20 20" opacity="0.5"/>
        <path d="M80 0 L60 20" opacity="0.5"/>
        <path d="M80 80 L60 60" opacity="0.5"/>
        <path d="M0 80 L20 60" opacity="0.5"/>
    </g>

    <!-- Decorative Gold Accents -->
    <circle cx="40" cy="40" r="3" fill="#D4AF37"/>
    <circle cx="40" cy="12" r="1.5" fill="#D4AF37"/>
    <circle cx="68" cy="40" r="1.5" fill="#D4AF37"/>
    <circle cx="40" cy="68" r="1.5" fill="#D4AF37"/>
    <circle cx="12" cy="40" r="1.5" fill="#D4AF37"/>
</svg>
